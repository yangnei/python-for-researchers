# Session 3
## Conditionals & Boolean Logic

Make decisions; write them the Pythonic way.

---

## if / elif / else

```python
if score >= 90:
    grade = "A"
elif score >= 80:
    grade = "B"
elif score >= 70:
    grade = "C"
else:
    grade = "F"
```

Indentation defines the block. `elif` = "else if". Only the **first** true branch runs.

---

## Comparison operators

`==`  `!=`  `<`  `<=`  `>`  `>=`

```python
score == 100      # equal (VALUE — recall Session 2)
score != 0
0 <= score <= 100 # chained! reads like math
```

🧠 No need for `score >= 0 and score <= 100` — chain it.

---

## Logical operators

```python
passed and submitted     # both
late or excused          # either
not flagged              # negate
```

**Short-circuit:** `a and b` skips `b` if `a` is falsy; `a or b` skips `b` if `a` is truthy.

---

## `and`/`or` return a VALUE, not a bool

```python
5 and 0        # 0      (and → first falsy / last)
0 or "hi"      # "hi"   (or → first truthy / last)
name = user_input or "Anonymous"   # default-value idiom
```

So don't write `if x == True` — just `if x:`.

---

## The Likert classifier (live)

```python
def likert_label(n):
    if n == 5: return "Strongly agree"
    if n == 4: return "Agree"
    if n == 3: return "Neutral"
    if n == 2: return "Disagree"
    if n == 1: return "Strongly disagree"
    return "Invalid"
```

Early `return` → no nesting needed.

---

## Ternary & match

```python
status = "pass" if score >= 60 else "fail"   # ternary

match command:                                # Python 3.10+
    case "start":      run()
    case "stop"|"halt": halt()    # multiple values
    case _:            unknown()  # default (_ = wildcard)
```

---

## Your turn

`examples/session-03/practice.md`:
1. Grade-band classifier — test the boundaries (89.999 / 90 / 90.001).
2. `is_valid_likert(n)` → only 1–5 integers are valid.

---

## Traps recap

- `if x == True` → just `if x:`.
- Use `x is None`, not `x == None`.
- `=` (assign) vs `==` (compare) — a classic typo.
- Test your **boundaries**; `>=` vs `>` decides a grade.

## Summary
You can branch cleanly, chain comparisons, and use boolean values directly.

# Session 3 — Practice (25 min)

## Task 1 — Grade-band classifier
Write `letter_grade(score)` returning A/B/C/D/F (90/80/70/60 cutoffs).
**Test the boundaries:** what does 90 return? 89.999? 0? 100? -5? 101?

## Task 2 — Likert validator
Write `is_valid_likert(n)` that returns `True` only for the integers 1–5.
Make sure `is_valid_likert(3.0)`, `is_valid_likert("3")`, and `is_valid_likert(True)`
all behave sensibly. *(Recall Session 2: what is `True` here?)*

## Task 3 — Refactor
This is ugly. Rewrite it in two lines using truthiness and a ternary:
```python
if attended == True:
    if score >= 60:
        result = "pass"
    else:
        result = "fail"
else:
    result = "absent"
```

---

<details><summary>Show solutions</summary>

```python
# Task 1
def letter_grade(score):
    if not 0 <= score <= 100:
        return "Invalid"
    if score >= 90: return "A"
    if score >= 80: return "B"
    if score >= 70: return "C"
    if score >= 60: return "D"
    return "F"
# 90->A, 89.999->B, 0->F, 100->A, -5->Invalid, 101->Invalid

# Task 2
def is_valid_likert(n):
    # reject bools (True would pass as int 1) and non-ints
    return isinstance(n, int) and not isinstance(n, bool) and 1 <= n <= 5
# is_valid_likert(3.0) -> False (it's a float)
# is_valid_likert("3") -> False (it's a str)
# is_valid_likert(True) -> False (explicitly excluded)

# Task 3
result = ("pass" if score >= 60 else "fail") if attended else "absent"
```

### Quiz — Conditionals
1. Rewrite `if x >= 90 and x < 100:` using a chained comparison.
2. What is `5 and 0`? What is `0 or "hi"`?
3. Why is `if passed == True:` not ideal? Write the better version.
4. (Practical) One-line ternary: `"pass"` if `score >= 60` else `"fail"`.

<details><summary>Show answers</summary>

**Answers:** 1. `if 90 <= x < 100:`. 2. `0` and `"hi"` (they return an operand). 3. `passed`
is already a bool; write `if passed:`. 4. `result = "pass" if score >= 60 else "fail"`.
