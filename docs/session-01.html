# Session 1
## Running Python, Types & the Type Traps

*Learn Python — a two-hour session, in two halves.*

**Part A:** Running Python, Variables & Types  ·  **Part B:** The Dynamic-Typing Traps

---

# Part A
## Running Python, Variables & Types

---

## Why Python (for you)

- Free, readable, the lingua franca of research computing.
- Glue between your data, your stats, and your writing.
- Today: from zero to "I ran a program."

> Mantra for the whole course: **readability wins**.

---

## Two ways to run Python

1. **REPL** — type `python3`, get `>>>`, run one line at a time. Great for experiments.
2. **Script** — save `hello.py`, run `python3 hello.py`. Great for real work.

```python
# hello.py
print("Hello, researcher")
```

---

## Variables = labels on objects

```python
n = 30          # an int
mean = 3.7      # a float
name = "Ada"    # a str
passed = True   # a bool
missing = None  # "no value"
```

`=` is an **action** ("stick this label on that object"), **not** a math equation.
So `n = n + 1` is fine.

🧠 In stats you name quantities (`n`, `α`). Same idea — but the name can be re-pointed.

---

## The 5 core types

| Type | Example | Think |
|---|---|---|
| `int` | `30` | counts |
| `float` | `3.7` | measurements |
| `str` | `"Ada"` | text |
| `bool` | `True`/`False` | flags |
| `NoneType` | `None` | missing |

`type(x)` tells you which.

---

## Input & output

```python
name = input("Your name: ")        # ⚠️ ALWAYS a str
age  = int(input("Your age: "))    # convert right away
print("Hi", name, "— age", age)
```

**The #1 week-one trap:** `input()` gives you text.
`"5" + "3"` is `"53"`, not `8`.

---

## f-strings (use these)

```python
score = 87.456
print(f"{name} scored {score:.1f}")   # one decimal
print(f"{1234567:,}")                  # 1,234,567
print(f"{0.873:.1%}")                  # 87.3%
```

Cleaner than `+` concatenation and no type errors.

---

## Type conversion (casting)

```python
int("42")     # 42
float("3.14") # 3.14
str(42)       # "42"
int(3.9)      # 3   (truncates, doesn't round!)
round(3.9)    # 4
```

`int(input(...))` = read text, convert to number, in one step.

---

## Reading a traceback (don't panic)

```text
Traceback (most recent call last):
  File "x.py", line 3, in <module>
    age = int(input("Age: "))
ValueError: invalid literal for int() with base 10: 'thirty'
```

**Read the LAST line first.** It names the problem: `ValueError`, and the bad value `'thirty'`.

---

## Live demo & your turn

- Live: `greet.py`, then a "years to graduation" calculator. We'll break it once on purpose.
- You: `examples/session-01/practice.md` — build a GPA-or-BMI style script.

---

## Traps recap

- `input()` → **always a string**; convert with `int()`/`float()`.
- `print(a, b)` (comma → spaces) vs `print(a + b)` (must be same type).
- `int(3.9)` truncates to `3`; use `round()` to round.

## Summary
You can run code, name values, convert types, format output, and read an error.
**Next:** *Part B of this session* — the dynamic-typing traps.

<script type="text/markdown" id="lesson-b-md">
# Part B
## The Dynamic-Typing Traps

---

## A name is just a label

Python won't lock a name to a type — it can point at an `int` now and a
`str` later. That freedom is powerful, but it creates **traps** where the
result contradicts your intuition.

> This half is hands-on. Every rule below has a one-line, runnable trap in
> **Traps — predict, then run** at the bottom of the page. Predict first,
> then reveal.

---

## `==` value, `is` identity

- `==` asks "same value?" — almost always what you want.
- `is` asks "same object?" — use it only for `None` (and `True`/`False`).
- `b = a` does **not** copy: both names point at one list, so mutating `a`
  shows through `b`. Copy with `list(a)` or `a[:]`.

🧠 Same GPA = `==`. Same student = `is`.

---

## Booleans are integers

- `bool` is a *subtype* of `int`, so `True` behaves as `1` and `False` as `0`.
- That means `5 + True` works, and `sum(flags)` counts how many are `True`.
- Identity still differs, and `isinstance(True, int)` is true while
  `type(True) is int` is not.

🧠 Dummy coding (1/0) baked right into the language.

---

## Numbers: int, float, division

- `/` **always** returns a float (`4 / 2` is `2.0`); `//` floors **toward −∞**.
- `3 == 3.0` compares by value, but decimals are stored in **binary**, so
  `0.1 + 0.2` is not exactly `0.3`.
- Never test two floats with `==` — use `math.isclose(a, b)`. (You already
  never compare two measured scores for exact equality; same instinct.)

---

## Comparing across types

- `==` / `!=` across types returns `False` and never crashes.
- `<` / `>` across incompatible types raises **TypeError** — the computer can
  ask "same?" but can't *rank* text against numbers.
- A list and a tuple with the same contents are **never equal**; sequences
  compare element by element.

---

## Truthiness

- Falsy: `0  0.0  ""  []  {}  set()  None`. Truthy: everything else —
  including `"0"`, `"False"`, and `[0]`.
- Idiom: `if scores:` rather than `if len(scores) > 0:`.
- But convert user text first — `"0"` is truthy.

---

## Now spring the traps

Open **Traps — predict, then run** below: ~18 one-line traps. For each one,
**say your prediction out loud, then run it** to reveal the real result and
the reason behind it.

Then in `examples/session-01/practice.md`: write `clean_score(value)` that
accepts `5`, `5.0`, or `"5"` and returns a float, rejecting nonsense — safely.

**Next:** Control flow & data structures.

<script type="text/markdown" id="traps-md">
## Traps — predict, then reveal
Read each snippet and decide what it does **before** you reveal the answer. To run and tinker with them line by line, open **&#9656; Traps — predict, then run** just below.

<div class="trap">

**1.**

```python
ana_scores = [88, 91]
ben_scores = [88, 91]
ana_scores is ben_scores
```

Most people expect `True — the two lists are identical`.

<details><summary>Reveal the result</summary>

&rarr; `False`

`==` compares VALUES (and `ana_scores == ben_scores` is True); `is` compares IDENTITY — whether they are the same object in memory. Ana's and Ben's lists just happen to match. Use `==` for values and keep `is` for `None`.

</details>

</div>

<div class="trap">

**2.**

```python
roster = ['Ana', 'Ben']
backup = roster
roster.append('Cara')
backup
```

Most people expect `['Ana', 'Ben'] — backup was taken before Cara`.

<details><summary>Reveal the result</summary>

&rarr; `['Ana', 'Ben', 'Cara']`

`backup = roster` does not copy: both names point at one list, so appending through `roster` shows up in `backup` too. Copy with `list(roster)` or `roster[:]`.

</details>

</div>

<div class="trap">

**3.**

```python
attended = True
attended == 1
```

Most people expect `False — a yes/no flag isn't a number`.

<details><summary>Reveal the result</summary>

&rarr; `True`

`bool` is a subclass of `int`: `True == 1` and `False == 0`, which is why a spreadsheet's 1/0 lines up with Python's True/False.

</details>

</div>

<div class="trap">

**4.**

```python
base_score = 5
bonus = True
base_score + bonus
```

Most people expect `TypeError — you can't add a flag to a number`.

<details><summary>Reveal the result</summary>

&rarr; `6`

`True` acts as `1` (and `False` as `0`) in arithmetic — a quick way to add a bonus point for a flag.

</details>

</div>

<div class="trap">

**5.**

```python
passed = [True, False, True, True]
sum(passed)
```

Most people expect `an error, or 0`.

<details><summary>Reveal the result</summary>

&rarr; `3`

Summing booleans counts the `True`s — a handy way to count how many students passed.

</details>

</div>

<div class="trap">

**6.**

```python
reading_a = 0.1
reading_b = 0.2
reading_a + reading_b
```

Most people expect `0.3`.

<details><summary>Reveal the result</summary>

&rarr; `0.30000000000000004`

Floats are stored in binary, where 0.1 and 0.2 have no exact representation, so the tiny errors add up.

</details>

</div>

<div class="trap">

**7.**

```python
total = 0.1 + 0.2
total == 0.3
```

Most people expect `True`.

<details><summary>Reveal the result</summary>

&rarr; `False`

Because `0.1 + 0.2` is `0.30000000000000004`. Never test measured values with `==`; use `math.isclose(a, b)`.

</details>

</div>

<div class="trap">

**8.**

```python
missing_score = float('nan')
missing_score == missing_score
```

Most people expect `True — it is the very same value`.

<details><summary>Reveal the result</summary>

&rarr; `False`

`NaN` (a missing/invalid number) is defined to equal nothing, not even itself. Test it with `math.isnan(x)`.

</details>

</div>

<div class="trap">

**9.**

```python
points = 7
points / 2
```

Most people expect `3`.

<details><summary>Reveal the result</summary>

&rarr; `3.5`

`/` is always float (true) division. Use `//` when you want a whole number.

</details>

</div>

<div class="trap">

**10.**

```python
net = -7
net // 2
```

Most people expect `-3 (just chop off the decimal)`.

<details><summary>Reveal the result</summary>

&rarr; `-4`

`//` floors toward negative infinity, not toward zero, so `-7 // 2 == -4`.

</details>

</div>

<div class="trap">

**11.**

```python
cell = '5'   # a value read from a CSV
cell == 5
```

Most people expect `True — same digit`.

<details><summary>Reveal the result</summary>

&rarr; `False`

Python does no automatic text/number conversion, so a CSV string and a number are simply unequal (no error). Convert first: `int(cell) == 5`.

</details>

</div>

<div class="trap">

**12.**

```python
cell = '5'
5 > cell
```

Most people expect `False (or maybe True)`.

<details><summary>Reveal the result</summary>

&rarr; `TypeError: '>' not supported between instances of 'int' and 'str'`

Ordering a number against text raises TypeError — there is no sensible order. Convert first: `5 > int(cell)`.

</details>

</div>

<div class="trap">

**13.**

```python
as_list = [88, 91]
as_tuple = (88, 91)
as_list == as_tuple
```

Most people expect `True — same numbers`.

<details><summary>Reveal the result</summary>

&rarr; `False`

A list never equals a tuple, whatever the contents.

</details>

</div>

<div class="trap">

**14.**

```python
flag = True
type(flag) is int
```

Most people expect `True — bools are ints`.

<details><summary>Reveal the result</summary>

&rarr; `False`

`type()` is exact, and `flag`'s type is `bool`, not `int`. Use `isinstance` when you want subclass-aware checks.

</details>

</div>

<div class="trap">

**15.**

```python
flag = True
isinstance(flag, int)
```

Most people expect `False — it's a bool, not an int`.

<details><summary>Reveal the result</summary>

&rarr; `True`

`isinstance` respects subclassing, and `bool` IS a kind of `int`.

</details>

</div>

<div class="trap">

**16.**

```python
response = '0'   # what a respondent typed
bool(response)
```

Most people expect `False — it's zero`.

<details><summary>Reveal the result</summary>

&rarr; `True`

Any NON-EMPTY string is truthy, including '0' and 'False'. Only the empty string is falsy — so convert survey text before testing it.

</details>

</div>

<div class="trap">

**17.**

```python
submissions = []
bool(submissions)
```

Most people expect `True — the list exists`.

<details><summary>Reveal the result</summary>

&rarr; `False`

Empty containers (`[]`, `{}`, `''`, `0`, `None`) are all falsy, which is why `if submissions:` reads as 'are there any?'.

</details>

</div>

<div class="trap">

**18.**

```python
id_a = int('257')
id_b = int('257')   # two IDs parsed from text
id_a is id_b
```

Most people expect `True — same number`.

<details><summary>Reveal the result</summary>

&rarr; `False`

CPython pre-caches small ints (-5..256), so `is` accidentally looks True there; 257 built at runtime are separate objects. Compare values with `==`, never `is`.

</details>

</div>

<script type="text/markdown" id="quiz-md">
### Quiz — Running Python, Types & the Type Traps
*Part A — Variables & Types*
1. What type does `input("x: ")` return, always?
2. What does `"5" + "3"` evaluate to? How do you get `8`? And what is `int(3.9)`?

*Part B — The Dynamic-Typing Traps*
3. `a = [1,2]; b = [1,2]` — is `a == b`? is `a is b`? Why?
4. What is `True + True`? Why?
5. Is `0.1 + 0.2 == 0.3` True or False? How should you compare them?
6. What does `5 == "5"` give? What about `5 > "5"`?

<details><summary>Show answers</summary>

**Answers:** 1. `str`. 2. `"53"`; use `int("5") + int("3")`; `int(3.9)` is `3` (truncates).
3. `==` True (same value), `is` False (different objects). 4. `2` (bool is a subclass of int).
5. False; use `math.isclose(0.1+0.2, 0.3)` (or round). 6. `False`; `5 > "5"` raises `TypeError`
(can't order int vs str).

</details>
</script>
