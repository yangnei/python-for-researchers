# Session 7
## Files, Libraries & Research Data

The hour your actual data shows up.

---

## Opening files with `with`

```python
with open("notes.txt") as f:
    text = f.read()
# file auto-closes here, even if the code crashes
```

`with` = a context manager: sets up and tears down the resource for you.
Always prefer it to a bare `open()`/`close()`.

---

## File modes (mind the trap)

| Mode | Meaning |
|---|---|
| `"r"` | read (default) |
| `"w"` | write — **truncates the file to empty first!** |
| `"a"` | append |
| `"r+"` | read + write |

⚠️ Open the wrong file with `"w"` → its contents are gone.

---

## Reading text

```python
with open("notes.txt") as f:
    whole = f.read()           # one big string
    # or
    for line in f:             # line by line (memory-friendly)
        print(line.rstrip())
```

⚠️ A file object is exhausted after one pass — re-open to read again.

---

## CSV in, as dicts 🧠

```python
import csv
with open("students.csv", newline="") as f:
    for row in csv.DictReader(f):
        print(row["name"], row["score"])   # row is a dict keyed by header
```

`csv.DictReader` turns each row into a dict — your "list of dicts" dataset from Session 4.
(`newline=""` avoids blank rows on Windows.)

---

## CSV out

```python
with open("summary.csv", "w", newline="") as f:
    w = csv.DictWriter(f, fieldnames=["name", "score"])
    w.writeheader()
    w.writerow({"name": "Ana", "score": 91})
```

---

## Libraries a researcher reaches for

```python
import statistics
statistics.mean(xs); statistics.median(xs); statistics.stdev(xs)

import random
random.choice(xs); random.randint(1, 6); random.shuffle(xs)

from datetime import date
date.today()

from pathlib import Path
Path("students.csv").exists()
```

`pip install <package>` for third-party libs.

---

df = pd.read_csv("students.csv")

## Traps recap

- `"w"` silently overwrites — be sure of the filename.
- `csv` module → open with `newline=""`.
- Files exhaust after one read; re-open to re-read.
- Specify `encoding="utf-8"` for non-ASCII text.

# Session 7 — Practice (25 min)

Files provided: `students.csv`, `survey.csv`.

## Task 1 — Read & summarize students
Read `students.csv` with `csv.DictReader`. Remember the values are **strings** — convert
`score` to `int`. Print the class mean and median with the `statistics` module.

## Task 2 — Mean by major
Build `{major: mean_score}`. (Hint: `dict.setdefault(key, []).append(...)`.)

## Task 3 — Clean & summarize the survey
`survey.csv` has `"N/A"` and blanks in numeric columns. For each `q*` item, compute the
mean of the **valid** values only, and how many were valid. Write `survey_summary.csv`
with columns `item,mean,n_valid`.

## Task 4 — pandas teaser (optional)
If `pandas` is installed: `pd.read_csv("students.csv")["score"].describe()`. Compare the
mean to your hand-computed one.

## Trap check
What happens if you accidentally open `students.csv` with mode `"w"` before reading it?

---

statistics.mean(scores)                           # 75.5

for s in students:
    by_major.setdefault(s["major"], []).append(int(s["score"]))

def to_int(x):

```

### Quiz — Files & Data
1. What does opening a file in `"w"` mode do to existing contents?
2. Why prefer `with open(...)` over `open()`/`close()`?
3. After `csv.DictReader`, what type is each row?
4. CSV values read from a file are what type — and what must you do with numbers?

<details><summary>Show answers</summary>

**Answers:** 1. Truncates it to empty immediately. 2. `with` auto-closes the file even if the
code crashes. 3. A `dict` keyed by the header row. 4. Strings; convert with `int()`/`float()`.

</details>
