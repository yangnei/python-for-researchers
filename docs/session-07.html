# Session 7
## Exceptions & Defensive Code

Real research data is dirty. Make code that survives it.

---

## try / except

```python
try:
    n = int(value)
except ValueError:
    n = None        # handle the bad case
```

When code might fail at runtime, wrap it. The `except` catches the named error.

---

## Common exception types

| Exception | Happens when |
|---|---|
| `ValueError` | right type, bad value: `int("N/A")` |
| `TypeError` | wrong type: `5 > "5"` |
| `KeyError` | missing dict key: `d["nope"]` |
| `IndexError` | bad list index: `xs[99]` |
| `ZeroDivisionError` | `x / 0` |
| `FileNotFoundError` | `open("missing.csv")` |

---

## try / except / else / finally

```python
try:
    n = int(value)
except ValueError:
    print("not a number")
else:
    print("ok:", n)      # only if NO exception
finally:
    print("always runs")  # cleanup
```

---

## Raise your own

```python
def clean_likert(n):
    if not 1 <= n <= 5:
        raise ValueError(f"{n} not in 1–5")
    return n
```

`raise` throws an exception on purpose — caller decides how to handle it.

---

## EAFP vs LBYL

```python
# LBYL — "look before you leap"
if value.isdigit():
    n = int(value)

# EAFP — "easier to ask forgiveness" (Pythonic)
try:
    n = int(value)
except ValueError:
    n = None
```

Both valid. EAFP shines when "checking first" is hard or racy.

---

## assert (developer check, not validation)

```python
assert len(scores) > 0, "scores must not be empty"
```

For *your* sanity checks while developing. Can be disabled (`python -O`),
so **never** use `assert` to validate untrusted input — use `raise`.

---

## A first test with pytest

```python
# clean.py
def clean_likert(n):
    if not 1 <= n <= 5:
        raise ValueError("1–5 only")
    return n

# test_clean.py
import pytest
from clean import clean_likert

def test_valid():    assert clean_likert(3) == 3
def test_invalid():
    with pytest.raises(ValueError):
        clean_likert(9)
```
Run: `pytest`

---

## Your turn

`examples/session-07/practice.md`:
1. `safe_int(value)` returning int or None.
2. Clean a dirty survey list, collecting good values + a rejection log.
3. Write one `pytest` test.

---

## Traps recap

- **Never** bare `except:` — name the exception.
- Don't catch too broadly or swallow errors silently.
- `assert` ≠ input validation (use `raise`).
- Catch the *specific* error you expect.

## Summary
You can validate messy input and fail loudly when you should.
**Next:** read that messy data from real files.

# Session 7 — Practice (25 min)

## Task 1 — `safe_int`
Write `safe_int(value)` returning `int(value)` or `None` on failure. Test on
`"42"`, `"N/A"`, `""`, `None`, `3.0`.

## Task 2 — Clean a survey column
Given `raw = ["5","3","N/A","7","","1","two","4"]`, produce:
- `clean` — list of valid Likert ints (1–5), and
- `rejected` — list of `(value, reason)` pairs.
Use a `clean_likert(n)` that **raises** `ValueError` for out-of-range or non-ints.

## Task 3 — Write a test
Put `clean_likert` in `clean.py` and write `test_clean.py` with pytest:
one passing case and one `pytest.raises(ValueError)` case. Run `pytest`.

## Task 4 — Discuss
Why is `except:` (bare) dangerous? Give one error it would hide that you'd rather see.

---

<details><summary>Show solutions</summary>

```python
def safe_int(value):
    try:
        return int(value)
    except (ValueError, TypeError):
        return None

def clean_likert(n):
    if isinstance(n, bool) or not isinstance(n, int):
        raise ValueError(f"{n!r} not an int")
    if not 1 <= n <= 5:
        raise ValueError(f"{n} outside 1–5")
    return n

raw = ["5","3","N/A","7","","1","two","4"]
clean, rejected = [], []
for r in raw:
    try:
        clean.append(clean_likert(safe_int(r)))
    except ValueError as e:
        rejected.append((r, str(e)))
print(clean)      # [5, 3, 1, 4]
print(rejected)   # [('N/A', ...), ('7', ...), ('', ...), ('two', ...)]
```

```python
# test_clean.py
import pytest
from clean import clean_likert
def test_ok():   assert clean_likert(3) == 3
def test_bad():
    with pytest.raises(ValueError):
        clean_likert(9)
```

Task 4: a bare `except:` also catches `KeyboardInterrupt` (Ctrl+C) and `NameError`
from your own typos — so a misspelled variable would be silently swallowed instead of
showing you the bug. Always catch the specific exception you expect.

<script type="text/markdown" id="quiz-md">
### Quiz — Exceptions
1. Which exception does `int("N/A")` raise?
2. Why is a bare `except:` dangerous?
3. When should you use `raise` vs `assert`?
4. (Practical) Wrap `int(value)` so it returns `None` on failure.

<details><summary>Show answers</summary>

**Answers:** 1. `ValueError`. 2. It catches everything (even Ctrl+C and your own typos) and
can hide bugs. 3. `raise` to validate real/untrusted input; `assert` for developer sanity
checks (can be disabled). 4. `try: return int(value) except (ValueError, TypeError): return None`.

</details>
