# Session 4
## Loops & Iteration

Do something many times — the Pythonic way.

---

## while loops

```python
count = 0
while count < 3:
    print(count)
    count += 1
```

⚠️ Forget to change the condition → **infinite loop**. Kill it with **Ctrl+C**.

---

## for loops + range

```python
for i in range(5):        # 0,1,2,3,4
    print(i)

for x in [10, 20, 30]:    # each element directly
    print(x)
```

`range(1, 5)` → `1,2,3,4` — **stop is excluded** (off-by-one!).
`range(0, 10, 2)` → `0,2,4,6,8`.

---

## break & continue

```python
for x in data:
    if x is None:
        continue          # skip this one
    if x == "STOP":
        break             # leave the loop entirely
    process(x)
```

---

## The validation loop (you'll reuse this everywhere)

```python
while True:
    raw = input("Score 0–100: ")
    if raw.isdigit() and 0 <= int(raw) <= 100:
        score = int(raw)
        break
    print("Try again.")
```

---

## Stop juggling indices: enumerate & zip

```python
for i, name in enumerate(names):     # index + value
    print(i, name)

for name, score in zip(names, scores):   # two lists together
    print(name, score)
```

🧠 If you write `range(len(x))`, stop — `enumerate`/`zip` is cleaner.

---

## Your turn

`examples/session-04/practice.md`:
1. Average a list of scores (no `sum()` — use a loop), then with `sum()/len()`.
2. Walk `names` and `scores` together; print "name: PASS/FAIL".
3. Robust "ask until valid" prompt.

---

## Traps recap

- `range(1, 5)` excludes 5.
- **Don't modify a list while looping it** — iterate a copy or build a new list.
- Prefer `enumerate`/`zip` over `range(len(...))`.
- Infinite loop? Ctrl+C.

## Summary
You can repeat work, control loops, and iterate cleanly.
**Next:** the containers you loop *over* — lists, dicts, sets.

# Session 4 — Practice (25 min)

## Task 1 — Average two ways
Given `scores = [91, 58, 73, 64]`, compute the mean (a) with a manual loop and a running
total, and (b) with `sum(scores) / len(scores)`. Confirm they match.

## Task 2 — Pass/fail roster
With `names = ["Ana","Ben","Cara","Dev"]` and the scores above, use `zip` to print
`"<name>: PASS"` (score ≥ 60) or `"<name>: FAIL"`. Then count passes using `sum(...)`.

## Task 3 — Validation loop
Write a real `while True:` prompt that keeps asking for a score until the user types an
integer 0–100, then prints it. (Use `.isdigit()`.)

## Task 4 — Trap check
Why does this go wrong, and what's the fix?
```python
xs = [1, 2, 3, 4]
for x in xs:
    if x % 2 == 0:
        xs.remove(x)
print(xs)   # not [1, 3] — why?
```

---

<details><summary>Show solutions</summary>

```python
# Task 1
total = 0
for s in scores:
    total += s
print(total / len(scores), sum(scores) / len(scores))   # 71.5 71.5

# Task 2
for name, score in zip(names, scores):
    print(f"{name}: {'PASS' if score >= 60 else 'FAIL'}")
passes = sum(score >= 60 for score in scores)   # bools sum! (Session 2)
print("passes:", passes)                         # 3

# Task 3
while True:
    raw = input("Score 0–100: ")
    if raw.isdigit() and 0 <= int(raw) <= 100:
        print("Got", int(raw)); break
    print("Try again.")

# Task 4
# Removing while iterating shifts indices, so the loop skips elements.
# Fix: iterate a copy, or build a new list:
xs = [x for x in xs if x % 2 != 0]   # [1, 3]
```

### Quiz — Loops
1. What does `list(range(1, 5))` produce?
2. When should you use `enumerate` instead of `range(len(x))`?
3. Why can removing items from a list *while looping it* go wrong?
4. (Practical) Use `zip` to print each `name` with its `score`.

<details><summary>Show answers</summary>

**Answers:** 1. `[1, 2, 3, 4]` (5 excluded). 2. When you need both index and value.
3. Removing shifts indices, so the loop skips elements; iterate a copy or build a new list.
4. `for name, score in zip(names, scores): print(name, score)`.

</details>
